<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Rishi Parmar — Product Researcher & Strategist in Consumer Tech." />
  <title>Rishi Parmar — Product Research & Strategy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #000000;
      --surface: #111111;
      --surface-light: #1a1a1a;
      --lime: #CCFF00;
      --white: #FFFFFF;
      --grey: #888888;
      --grey-dim: #555555;
      --border: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.15);
      --radius-lg: 24px;
      --radius-xl: 32px;
      --radius-pill: 999px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--black);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    .font-display {
      font-family: 'Syne', sans-serif;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Syne', sans-serif;
    }

    ::selection {
      background: rgba(204, 255, 0, 0.2);
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--black);
    }

    ::-webkit-scrollbar-thumb {
      background: #222;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--lime);
    }

    /* ═══════════════════════════════════
       ANIMATIONS
       ═══════════════════════════════════ */

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideRight {
      from { opacity: 0; transform: translateX(60px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes countUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes accordion-open {
      from { max-height: 0; opacity: 0; }
      to { max-height: 300px; opacity: 1; }
    }

    @keyframes accordion-close {
      from { max-height: 300px; opacity: 1; }
      to { max-height: 0; opacity: 0; }
    }

    /* Animation classes */
    .animate-fade-in {
      animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .anim-d1 { animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards; opacity: 0; }
    .anim-d2 { animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards; opacity: 0; }
    .anim-d3 { animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards; opacity: 0; }
    .anim-d4 { animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards; opacity: 0; }
    .anim-d5 { animation: fadeInUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards; opacity: 0; }

    .sidebar-enter {
      animation: slideRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .marquee-track {
      animation: marquee 35s linear infinite;
    }

    .spin-slow {
      animation: spin-slow 20s linear infinite;
    }

    .pulse-dot {
      animation: pulse-dot 2s ease-in-out infinite;
    }

    .float-anim {
      animation: float 4s ease-in-out infinite;
    }

    /* Scroll-triggered reveal */
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }

    /* Hero portrait styling */
    .hero-portrait {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
    }

    .hero-portrait::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
    }

    .hero-portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(0.4) contrast(1.1);
      transition: filter 0.5s ease;
    }

    .hero-portrait:hover img {
      filter: grayscale(0) contrast(1.05);
    }

    /* Stats counter */
    .stat-number {
      font-variant-numeric: tabular-nums;
      transition: all 0.3s ease;
    }

    /* FAQ accordion */
    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                  opacity 0.3s ease,
                  padding 0.4s ease;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
    }

    .faq-answer.open {
      max-height: 300px;
      opacity: 1;
      padding-top: 1rem;
      padding-bottom: 0.5rem;
    }

    .faq-icon {
      transition: transform 0.3s ease;
    }

    .faq-icon.open {
      transform: rotate(45deg);
    }

    /* Giant footer text */
    .footer-giant-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(6rem, 20vw, 22rem);
      line-height: 0.85;
      color: rgba(255, 255, 255, 0.04);
      user-select: none;
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
    }

    /* Smoke texture overlay for hero */
    .smoke-bg {
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(204, 255, 0, 0.03) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(204, 255, 0, 0.02) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(255, 255, 255, 0.01) 0%, transparent 40%);
    }

    /* Rotating badge */
    .rotating-badge {
      animation: spin-slow 15s linear infinite;
    }

    /* Social icons vertical bar (reference has floating socials) */
    .social-float {
      position: fixed;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    @media (max-width: 768px) {
      .social-float {
        display: none;
      }
    }

    /* Focus visible */
    *:focus-visible {
      outline: 2px solid var(--lime);
      outline-offset: 2px;
    }

    /* Line clamp */
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
